kind = "web"
previewPath = "/"
title = "Doc Compare"
version = "1.0.0"
id = "artifacts/doc-compare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25166

[services.development]
run = "pnpm --filter @workspace/doc-compare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/doc-compare", "run", "build" ]
publicDir = "artifacts/doc-compare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25166"
BASE_PATH = "/"
